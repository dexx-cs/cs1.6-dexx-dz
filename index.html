<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CS 1.6 DZ</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: url("https://images.unsplash.com/photo-1605902711622-cfb43c4437d1") no-repeat center/cover;
}

/* تأثير غامق */
.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
    padding-top: 50px;
}

/* العنوان */
h1 {
    font-size: 50px;
    color: #00ffd5;
    text-shadow: 0 0 20px #00ffd5;
}

/* الكارد */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    margin: 20px auto;
    padding: 20px;
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 0 15px #00ffd5;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* الأزرار */
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    background: linear-gradient(45deg,#00ffd5,#00aaff);
    color: black;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    transform: scale(1.1);
}

/* زر join */
.join {
    background: red;
    color: white;
}
</style>
</head>

<body>

<div class="overlay">

<h1>🔥 CS 1.6 DZ 🔥</h1>

<div class="card">
<h2>🎮 مرحبا بيكم</h2>
<p>أفضل سيرفر Counter Strike 1.6</p>
</div>

<div class="card">
<h2>🖥️ IP Server</h2>
<p>connect 94.23.78.29:27020</p>

<a class="btn join" href="steam://connect/94.23.78.29:27020">🔥 Join Server</a
</div>

<div class="card">
<h2>📱 تواصل معنا</h2>

<a class="btn" href="https://instagram.com/ya9inx" target="_blank">Instagram</a>
<a class="btn" href="https://discord.gg/ya9inx" target="_blank">Discord</a>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dexx-cs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: black;
}

/* خلفية */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("guts.jpg") no-repeat center/cover;
    filter: brightness(0.3);
    z-index: -2;
}

/* عنوان */
.title {
    margin-top: 40px;
    font-size: 70px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px cyan; }
    to { text-shadow: 0 0 40px cyan, 0 0 80px purple; }
}

/* سكشن */
.section {
    margin-top: 40px;
}

/* صور */
.gallery {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 250px;
    border-radius: 15px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px cyan;
}

/* تحميل */
.download-card {
    margin: 15px auto;
    width: 260px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
}

/* أزرار */
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
}

.btn:hover {
    background: cyan;
    color: black;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="title">Dexx-cs</div>

<!-- صور -->
<div class="section">
<h2>Gallery</h2>
<div class="gallery">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
</div>
</div>

<!-- تحميل -->
<div class="section">
<h2>Downloads</h2>

<div class="download-card">
<p>Config CS</p>
<a href="file.zip" class="btn" download>Download</a>
</div>

<div class="download-card">
<p>Pack</p>
<a href="pack.rar" class="btn" download>Download</a>
</div>

</div>

<!-- روابط -->
<div class="section">
<a class="btn" href="https://discord.gg/2tawpwED" target="_blank">Discord</a>
<a class="btn" href="https://www.instagram.com/ya9inx" target="_blank">Instagram</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dexx CS</title>

<style>
:root {
    --main-color: red;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: black;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* خلفية نقاط متحركة */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(var(--main-color) 1px, transparent 1px);
    background-size: 25px 25px;
    animation: moveBg 15s linear infinite;
    opacity: 0.2;
    z-index: -1;
}

@keyframes moveBg {
    from {transform: translate(0,0);}
    to {transform: translate(-200px,-200px);}
}

/* بروفيل */
.profile img {
    width: 160px;
    border-radius: 20px;
    margin-top: 50px;
    box-shadow: 0 0 25px var(--main-color);
}

/* الاسم */
.name {
    font-size: 40px;
    margin-top: 15px;
    color: var(--main-color);
    text-shadow: 0 0 10px var(--main-color);
}

/* زر تغيير اللون */
.color-btn {
    margin: 20px;
    padding: 12px 20px;
    background: var(--main-color);
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* روابط */
.links a {
    display: inline-block;
    margin: 10px;
    padding: 12px 18px;
    background: #111;
    border-radius: 10px;
    text-decoration: none;
    color: var(--main-color);
    border: 1px solid var(--main-color);
    transition: 0.3s;
}

.links a:hover {
    background: var(--main-color);
    color: white;
}

/* كروت */
.cards {
    margin-top: 30px;
}

.card {
    background: #111;
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px var(--main-color);
    transform: translateY(50px);
    opacity: 0;
    transition: 0.6s;
}

.card.show {
    transform: translateY(0);
    opacity: 1;
}

.card h3 {
    color: var(--main-color);
}

/* صور أنمي */
.anime {
    margin-top: 50px;
}

.anime img {
    width: 90%;
    max-width: 400px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0 0 20px var(--main-color);
}

</style>
</head>

<body>

<div class="profile">
    <img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee">
</div>

<div class="name">dexx-cs</div>

<button class="color-btn" onclick="changeColor()">لونك المفضل</button>

<div class="links">
    <a href="https://www.instagram.com/ya9inx?igsh=MTB0bXJycmNzZWJq">Instagram</a>
    <a href="https://discord.gg/2tawpwED">Discord</a>
</div>

<div class="cards">
    <div class="card">🔥 موقع Gaming رهيب</div>
    <div class="card">💻 تطوير مواقع احترافية</div>
    <div class="card">🎮 CS 1.6 Player</div>
</div>

<div class="anime">
    <img src="https://wallpapercave.com/wp/wp8933851.jpg">
    <img src="https://wallpapercave.com/wp/wp8933847.jpg">
    <img src="https://wallpapercave.com/wp/wp8933843.jpg">
</div>

<script>

/* تغيير اللون */
function changeColor() {
    const colors = ["red","blue","purple","cyan","lime","orange"];
    const random = colors[Math.floor(Math.random() * colors.length)];
    document.documentElement.style.setProperty('--main-color', random);
}

/* انيميشن عند النزول */
window.addEventListener("scroll", () => {
    document.querySelectorAll(".card").forEach(card => {
        const top = card.getBoundingClientRect().top;
        if(top < window.innerHeight - 50){
            card.classList.add("show");
        }
    });
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dexx-cs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: black;
    overflow-x: hidden;
}

/* خلفية */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("guts.jpg") no-repeat center center/cover;
    filter: brightness(0.3);
    z-index: -2;
}

/* particles */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* اسم احترافي */
.title {
    margin-top: 30px;
    font-size: 80px;
    font-weight: bold;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #00f7ff,
        0 0 40px #00f7ff,
        0 0 80px #00f7ff;
}

/* زر موسيقى */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    border: 2px solid white;
    padding: 12px 18px;
    border-radius: 12px;
    cursor: pointer;
}

/* الصور */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.gallery img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 20px;
    transition: 0.4s;
    filter: grayscale(100%) contrast(120%);
}

.gallery img:hover {
    transform: scale(1.1);
    filter: grayscale(0%);
    box-shadow: 0 0 20px cyan;
}

/* الأزرار */
.buttons {
    margin: 30px;
}

.btn {
    display: block;
    width: 280px;
    margin: 12px auto;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
    transform: scale(1.1);
}
</style>
</head>

<body>

<!-- موسيقى -->
<audio id="music" loop preload="auto">
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()" id="musicBtn">
<i class="fas fa-play"></i>
</div>

<div class="title">Dexx-cs</div>

<!-- صورك -->
<div class="gallery">
<img src="guts.jpg">
<img src="me.jpg">
<img src="eye.jpg">
</div>

<!-- أزرار -->
<div class="buttons">

<a class="btn" href="https://discord.gg/2tawpwED" target="_blank">
<i class="fab fa-discord"></i> Discord
</a>

<a class="btn" href="https://www.instagram.com/ya9inx?igsh=MTB0bXJycmNzZWJq" target="_blank">
<i class="fab fa-instagram"></i> Instagram
</a>

<a class="btn" href="steam://connect/94.23.78.29:27020">
<i class="fas fa-gamepad"></i> Join Server
</a>

<a class="btn" href="https://youtube.com/@hits-peek?si=JeuCt0Sd_B1RrOkx" target="_blank">
<i class="fab fa-youtube"></i> YouTube
</a>

<a class="btn" href="https://www.tiktok.com/@hitsxso2?_r=1&_t=ZS-95KwtRAxsvv" target="_blank">
<i class="fab fa-tiktok"></i> TikTok
</a>

</div>

<!-- particles -->
<canvas id="particles"></canvas>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let playing = false;

function toggleMusic() {
    if (playing) {
        music.pause();
        btn.innerHTML = '<i class="fas fa-play"></i>';
    } else {
        music.play();
        btn.innerHTML = '<i class="fas fa-pause"></i>';
    }
    playing = !playing;
}

/* تشغيل تلقائي عند أول كليك */
document.body.addEventListener("click", () => {
    if (!playing) {
        music.play();
        playing = true;
        btn.innerHTML = '<i class="fas fa-pause"></i>';
    }
});

/* particles */
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2
    });
}function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
        p.y += 0.4;
        if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

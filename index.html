<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dexx-cs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: black;
    overflow-x: hidden;
}

/* خلفية FULL */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://wallpaperaccess.com/full/8423563.jpg") no-repeat center center/cover;
    filter: brightness(0.4);
    z-index: -2;
}

/* particles */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* الاسم */
.title {
    margin-top: 40px;
    font-size: 70px;
    font-weight: bold;
    background: linear-gradient(90deg, cyan, purple, red);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s infinite linear;
}

@keyframes shine {
    from {background-position: 0%;}
    to {background-position: 200%;}
}

/* زر موسيقى */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    border: 2px solid cyan;
    padding: 12px 18px;
    border-radius: 12px;
    cursor: pointer;
}

/* الصور */
.gallery {
    margin-top: 50px;
}

.gallery img {
    width: 220px;
    margin: 10px;
    border-radius: 15px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* الأزرار */
.buttons {
    margin-top: 30px;
}

.btn {
    display: block;
    width: 280px;
    margin: 12px auto;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

.btn:hover {
    background: cyan;
    color: black;
    transform: scale(1.1);
}
</style>
</head>

<body>

<!-- موسيقى -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()" id="musicBtn">
<i class="fas fa-play"></i>
</div>

<div class="title">Dexx-cs</div>

<!-- صور Jujutsu -->
<div class="gallery">
<img src="https://wallpaperaccess.com/full/8403895.jpg">
<img src="https://wallpaperaccess.com/full/8403910.jpg">
<img src="https://wallpaperaccess.com/full/8403930.jpg">
<img src="https://wallpaperaccess.com/full/8403950.jpg">
<img src="https://wallpaperaccess.com/full/8403970.jpg">
<img src="https://wallpaperaccess.com/full/8403990.jpg">
</div>

<!-- أزرار بزاف -->
<div class="buttons">

<a class="btn" href="https://discord.gg/YOUR-LINK" target="_blank">
<i class="fab fa-discord"></i> Discord
</a>

<a class="btn" href="https://instagram.com/YOUR-LINK" target="_blank">
<i class="fab fa-instagram"></i> Instagram
</a>

<a class="btn" href="steam://connect/YOUR-IP">
<i class="fas fa-gamepad"></i> Join Server
</a>

<a class="btn" href="https://youtube.com" target="_blank">
<i class="fab fa-youtube"></i> YouTube
</a>

<a class="btn" href="https://tiktok.com" target="_blank">
<i class="fab fa-tiktok"></i> TikTok
</a>

<a class="btn" href="https://facebook.com" target="_blank">
<i class="fab fa-facebook"></i> Facebook
</a>

</div>

<!-- particles -->
<canvas id="particles"></canvas>

<script>
/* music */
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let playing = false;

function toggleMusic() {
    if (playing) {
        music.pause();
        btn.innerHTML = '<i class="fas fa-play"></i>';
    } else {
        music.play();
        btn.innerHTML = '<i class="fas fa-pause"></i>';
    }
    playing = !playing;
}

/* particles */
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2
    });
}function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
        p.y += 0.4;
        if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

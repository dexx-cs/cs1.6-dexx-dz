<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CS 1.6 DZ</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    color: white;

    /* 🔥 الصورة */
    background: url("car.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* طبقة تغميق */
.overlay {
    min-height: 100vh;
    width: 100%;
    background: rgba(0,0,0,0.75);

    display: flex;
    justify-content: center;
    align-items: center;
}

/* container */
.container {
    width: 90%;
    max-width: 1000px;
    text-align: center;
}

/* title */
.title {
    font-size: 60px;
    margin-bottom: 30px;
    color: #00ffc3;
    text-shadow: 0 0 15px #00ffc3;
}

/* cards grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* card */
.card {
    background: rgba(255,255,255,0.07);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);

    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

/* ip */
.ip {
    margin: 10px 0;
    color: #00ffc3;
    font-weight: bold;
}

/* join button */
.join {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 20px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-weight: bold;

    background: red;
    transition: 0.3s;
}

.join:hover {
    background: darkred;
    transform: scale(1.05);
}

/* features */
.features p {
    margin: 5px 0;
}

/* socials */
.socials {
    margin-top: 10px;
}

.socials a {
    display: inline-block;
    margin: 5px;
    padding: 10px 15px;
    border-radius: 25px;
    text-decoration: none;
    font-weight: bold;

    background: #00ffc3;
    color: black;
    transition: 0.3s;
}

.socials a:hover {
    background: #00cfa0;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<div class="title">🔥 CS 1.6 DZ 🔥</div>

<div class="grid">

<!-- welcome -->
<div class="card">
    <h2>🎮 مرحبا</h2>
    <p>أفضل سيرفر في الجزائر</p>
</div>

<!-- server -->
<div class="card">
    <h2>💻 Server</h2>
    <div class="ip">94.23.78.29:27020</div>

    <a class="join" href="steam://connect/94.23.78.29:27020">
        🔥 Join Server
    </a>
</div>

<!-- features -->
<div class="card features">
    <h2>🔥 Features</h2>
    <p>✔ Headshot Only</p>
    <p>✔ Anti-Cheat قوي</p>
    <p>✔ Ping منخفض</p>
    <p>✔ Admin Active</p>
</div>

<!-- contact -->
<div class="card">
    <h2>📱 تواصل</h2>

    <div class="socials">
        <a href="https://instagram.com/ya9inx" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a href="https://discord.gg/ya9inx" target="_blank">
            <i class="fab fa-discord"></i> Discord
        </a>
    </div>
</div>

</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CS 1.6 DZ</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* VIDEO BACKGROUND */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    padding: 10px;
    color: #00ffe1;
    font-weight: bold;
    z-index: 1000;
}

/* overlay */
.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
    padding-top: 70px;
}

/* title */
h1 {
    font-size: 45px;
    color: #00ffe1;
    text-shadow: 0 0 20px #00ffe1;
}

/* cards */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    margin: 25px auto;
    padding: 25px;
    width: 320px;
    border-radius: 20px;
    box-shadow: 0 0 25px #00ffe1;
    transition: 0.5s;
    opacity: 0;
    transform: translateY(50px);
}

.card:hover {
    transform: scale(1.07);
}

/* buttons */
.btn {
    display: block;
    margin: 12px auto;
    padding: 12px;
    width: 80%;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

/* join */
.join {
    background: linear-gradient(45deg, red, orange);
    box-shadow: 0 0 20px red;
}

.join:hover {
    transform: scale(1.15);
}

/* socials */
.insta {
    background: linear-gradient(45deg,#ff00cc,#ff6600);
}

.discord {
    background: #5865F2;
}

/* players */
.players {
    margin-top: 10px;
    color: #00ffe1;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-gaming-keyboard-1605/1080p.mp4">
</video>

<!-- NAVBAR -->
<div class="navbar">🔥 CS DZ SERVER</div>

<div class="overlay">

<h1>🔥 CS 1.6 DZ 🔥</h1>

<div class="card">
<h2>🎮 مرحبا بيكم</h2>
<p>أفضل سيرفر Counter Strike 1.6</p>
</div>

<div class="card">
<h2>🔥 مميزات السيرفر</h2>
<p>✔ Headshot Only</p>
<p>✔ Anti-Cheat قوي</p>
<p>✔ Ping منخفض</p>
<p>✔ Admin Active</p>
</div>

<div class="card">
<h2>🖥️ IP Server</h2>
<p id="ip">connect 94.23.78.29:27020</p>

<div class="players" id="players">👥 Players: 0/32</div>

<a class="btn join" href="#" onclick="joinServer()">🔥 Join Server</a>
</div>

<div class="card">
<h2>📱 تواصل معنا</h2>

<a class="btn insta" id="insta" href="https://instagram.com/ya9inx" target="_blank">Instagram</a>
<a class="btn discord" id="discord" href="https://discord.gg/ya9inx" target="_blank">Discord</a>

</div>

</div>

<script>
// animation scroll
window.addEventListener("scroll", () => {
  document.querySelectorAll(".card").forEach(card => {
    card.style.opacity = "1";
    card.style.transform = "translateY(0)";
  });
});

// fake players
setInterval(() => {
  let num = Math.floor(Math.random() * 32);
  document.getElementById("players").innerText = "👥 Players: " + num + "/32";
}, 2000);

// join
function joinServer() {
  navigator.clipboard.writeText("connect 94.23.78.29:27020");
  alert("IP copied 😎");
  window.location.href = "steam://connect/94.23.78.29:27020";
}
</script>

</body>
</html>

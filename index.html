<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dexx-cs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    overflow: hidden;
    background: black;
}

/* Loading */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    z-index: 999;
}

/* خلفية */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://wallpaperaccess.com/full/36626.jpg") no-repeat center;
    background-size: cover;
    animation: zoom 20s infinite alternate;
    filter: brightness(0.4);
    z-index: -2;
}

@keyframes zoom {
    from {transform: scale(1);}
    to {transform: scale(1.2);}
}

/* particles */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* الاسم */
.title {
    position: absolute;
    top: 20px;
    width: 100%;
    font-size: 70px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {text-shadow: 0 0 10px red;}
    to {text-shadow: 0 0 30px cyan;}
}

/* زر الموسيقى */
.music-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: black;
    border: 2px solid cyan;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
}

/* الأزرار */
.btn {
    display: block;
    width: 260px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    background: rgba(0,0,0,0.7);
    border: 2px solid cyan;
    color: white;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

.btn:hover {
    background: cyan;
    color: black;
    transform: scale(1.1);
}
</style>
</head>

<body>

<!-- Loading -->
<div id="loading">Loading Dexx-cs...</div>

<!-- Canvas -->
<canvas id="particles"></canvas>

<!-- موسيقى -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<div class="title">Dexx-cs</div>

<!-- زر -->
<div class="music-btn" onclick="toggleMusic()" id="musicBtn">
    <i class="fas fa-play"></i>
</div>

<!-- أزرار -->
<div style="margin-top:200px;">
<a class="btn" href="https://discord.gg/YOUR-LINK" target="_blank">
<i class="fab fa-discord"></i> Discord
</a>

<a class="btn" href="https://instagram.com/YOUR-LINK" target="_blank">
<i class="fab fa-instagram"></i> Instagram
</a>

<a class="btn" href="steam://connect/94.23.78.29:27020">
<i class="fas fa-gamepad"></i> Join Server
</a>
</div>

<script>
/* loading */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loading").style.display = "none";
    }, 2000);
};

/* music */
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let playing = false;

function toggleMusic() {
    if (playing) {
        music.pause();
        btn.innerHTML = '<i class="fas fa-play"></i>';
    } else {
        music.play();
        btn.innerHTML = '<i class="fas fa-pause"></i>';
    }
    playing = !playing;
}

/* particles */
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 3
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
        p.y += 0.5;
        if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

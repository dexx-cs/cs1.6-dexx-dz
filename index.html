<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CS 1.6 DZ</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* 🎥 فيديو خلفية */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* غطاء */
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding-top: 40px;
}

/* عنوان */
h1 {
  font-size: 40px;
  color: #00ffcc;
  text-shadow: 0 0 20px #00ffcc;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #00ffcc; }
  to { text-shadow: 0 0 30px #00ffcc; }
}

/* كارد */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin: 20px auto;
  padding: 20px;
  width: 300px;
  border-radius: 15px;
  box-shadow: 0 0 20px #00ffcc;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* زر */
.btn {
  display: block;
  margin: 10px auto;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: #00ffcc;
  transition: 0.3s;
}

.btn:hover {
  background: #00ccaa;
}

/* زر Join */
.join {
  background: red;
}

.join:hover {
  background: darkred;
}

/* أنيميشن دخول */
.fade {
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<!-- 🎥 فيديو -->
<video autoplay muted loop id="bgVideo">
  <source src="https://cdn.coverr.co/videos/coverr-gaming-room-5179/1080p.mp4" type="video/mp4">
</video>

<!-- 🔊 صوت -->
<audio autoplay>
  <source src="https://www.myinstants.com/media/sounds/csgo-start.mp3">
</audio>

<div class="overlay">

<h1>🔥 CS 1.6 DZ 🔥</h1>

<!-- مرحبا -->
<div class="card fade">
<h2>🎮 مرحبا بيكم</h2>
<p>أفضل سيرفر Counter Strike 1.6</p>
</div>

<!-- IP -->
<div class="card fade">
<h2>💻 IP Server</h2>
<p>connect 94.23.78.29:27020</p>

<a class="btn join" href="steam://connect/94.23.78.29:27020">
🔥 Join Server
</a>
</div>

<!-- مميزات -->
<div class="card fade">
<h2>🔥 مميزات السيرفر</h2>
<p>✔ Headshot Only</p>
<p>✔ Anti-Cheat قوي</p>
<p>✔ Ping منخفض</p>
<p>✔ Admin Active</p>
</div>

<!-- تواصل -->
<div class="card fade">
<h2>📱 تواصل معنا</h2>

<a class="btn" href="https://instagram.com/ya9inx" target="_blank">
<i class="fab fa-instagram"></i> Instagram
</a>

<a class="btn" href="https://discord.gg/ya9inx" target="_blank">
<i class="fab fa-discord"></i> Discord
</a>

</div>

</div>

</body>
</html>

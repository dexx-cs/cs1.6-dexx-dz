<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dexx community</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow-x: hidden;
}

/* خلفية نقاط متحركة */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(red 1px, transparent 1px);
    background-size: 25px 25px;
    animation: moveBg 20s linear infinite;
    opacity: 0.2;
    z-index: -1;
}

@keyframes moveBg {
    from {transform: translate(0,0);}
    to {transform: translate(-200px,-200px);}
}

/* الصورة */
.profile img {
    width: 170px;
    border-radius: 20px;
    margin-top: 60px;
    box-shadow: 0 0 25px red;
}

/* الاسم */
.name {
    font-size: 42px;
    margin-top: 20px;
    letter-spacing: 2px;
}

.name span {
    color: red;
    text-shadow: 0 0 10px red;
}

/* الشكل */
.shape {
    width: 220px;
    height: 220px;
    background: red;
    margin: 30px auto;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    box-shadow: 0 0 40px red;
}

/* العنوان */
.section h2 {
    margin-top: 30px;
    color: #ff4d4d;
}

/* الكروت */
.card {
    background: #111;
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px red;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card h3 {
    color: red;
}

/* أزرار */
.buttons a {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    background: red;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
}

.buttons a:hover {
    background: darkred;
}
</style>

</head>

<body>

<div class="profile">
    <img src="https://pin.it/33zwEYG7K">
</div>

<div class="name">
    dexx <span>cs</span>
</div>

<div class="shape"></div>

<div class="buttons">
    <a href="https://www.instagram.com/ya9inx?igsh=MTB0bXJycmNzZWJq">Instagram</a>
    <a href="https://discord.gg/2tawpwED">discord</a>
</div>

<div class="section">
    <h2>مواقع من تطويري</h2>

    <div class="card">
        <h3>صوتيات القرآن</h3>
        <p>تجربة استماع رائعة</p>
    </div>

    <div class="card">
        <h3>Gaming Site</h3>
        <p>أفضل ألعاب أونلاين</p>
    </div>

</div>

</body>
</html>

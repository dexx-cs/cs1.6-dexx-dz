<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dexx-cs</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: black;
}

/* خلفية */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("guts.jpg") no-repeat center/cover;
    filter: brightness(0.3);
    z-index: -2;
}

/* عنوان */
.title {
    margin-top: 40px;
    font-size: 70px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px cyan; }
    to { text-shadow: 0 0 40px cyan, 0 0 80px purple; }
}

/* زر موسيقى */
.music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    border: 2px solid cyan;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

/* صور */
.gallery {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 250px;
    border-radius: 15px;
}

/* تحميل */
.download-card {
    margin: 15px auto;
    width: 260px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
}

/* أزرار */
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 220px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- موسيقى -->
<audio id="music" loop>
<source src="𝙶𝚃𝙰 𝙸𝚅 𝚃𝚑𝚎𝚖𝚎 [𝚂𝚕𝚘𝚠𝚎𝚍](M4A_128K).m4a">
</audio>

<div class="music-btn" onclick="toggleMusic()" id="btn">▶</div>

<div class="title">Dexx-cs</div>

<!-- صور -->
<h2>Gallery</h2>
<div class="gallery">
<img src="death.jpg">
<img src="images.jpg">
<img src="Hendrik on TikTok.jpg">
</div>

<!-- تحميل -->
<h2>Downloads</h2>

<div class="download-card">
<p>CS 1.6 Game</p>
<a href="cstrike.exe" class="btn" download>Download</a>
</div>

<div class="download-card">
<p>Skin Pack</p>
<a href="skins.rar" class="btn" download>Download</a>
</div>

<!-- روابط -->
<a class="btn" href="https://discord.gg/2tawpwED" target="_blank">Discord</a>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("btn");
let playing = false;

function toggleMusic(){
    if(playing){
        music.pause();
        btn.innerHTML = "▶";
    }else{
        music.play();
        music.volume = 0.3;
        btn.innerHTML = "⏸";
    }
    playing = !playing;
}
</script>

</body>
</html>

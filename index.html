<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CS 1.6 DZ</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    overflow-x: hidden;

    /* 🔥 هنا الصورة تاعك */
    background: url("dz.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* طبقة تغميق */
.overlay {
    background: rgba(0,0,0,0.65);
    min-height: 100vh;
    padding: 40px;
}

/* عنوان */
h1 {
    font-size: 50px;
    color: #00ffc3;
    text-shadow: 0 0 20px #00ffc3;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ffc3; }
    to { text-shadow: 0 0 30px #00ffc3; }
}

/* الكارد */
.card {
    background: rgba(255,255,255,0.08);
    margin: 20px auto;
    padding: 20px;
    width: 320px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,200,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* زر */
.btn {
    display: block;
    margin: 10px auto;
    padding: 12px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

/* زر Join */
.join {
    background: #ff3b3b;
    box-shadow: 0 0 10px red;
}

.join:hover {
    background: #ff0000;
    box-shadow: 0 0 20px red;
}

/* أزرار سوشيال */
.social {
    background: #00ffc3;
    color: black;
}

.social:hover {
    background: #00cfa0;
}

</style>
</head>

<body>

<div class="overlay">

<h1>🔥 CS 1.6 DZ 🔥</h1>

<div class="card">
    <h2>🎮 مرحبا بكم</h2>
    <p>أفضل سيرفر Counter Strike 1.6</p>
</div>

<div class="card">
    <h2>💻 IP Server</h2>
    <p>connect 94.23.78.29:27020</p>

    <!-- 🔥 زر يدخل مباشرة -->
    <a class="btn join" href="steam://connect/94.23.78.29:27020">
        🔥 Join Server
    </a>
</div>

<div class="card">
    <h2>🔥 مميزات السيرفر</h2>
    <p>✔ Headshot Only</p>
    <p>✔ Anti-Cheat قوي</p>
    <p>✔ Ping منخفض</p>
    <p>✔ Admin Active</p>
</div>

<div class="card">
    <h2>📱 تواصل معنا</h2>

    <a class="btn social" href="https://instagram.com/ya9inx" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
    </a>

    <a class="btn social" href="https://discord.gg/ya9inx" target="_blank">
        <i class="fab fa-discord"></i> Discord
    </a>
</div>

</div>

</body>
</html>

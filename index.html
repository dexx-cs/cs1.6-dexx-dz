<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CS DZ SERVER</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    color:white;
    overflow:hidden;

    background: url("car.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* طبقة سوداء + تأثير */
.overlay {
    background: radial-gradient(circle, rgba(0,0,0,0.6), rgba(0,0,0,0.95));
    min-height:100vh;
    padding:40px;
}

/* لوقو */
.logo {
    font-size:55px;
    font-weight:bold;
    color:#00ffe0;
    text-shadow:0 0 20px #00ffe0, 0 0 40px #00ffe0;
    animation: neon 2s infinite alternate;
}

@keyframes neon {
    from { text-shadow:0 0 10px #00ffe0; }
    to { text-shadow:0 0 40px #00ffe0; }
}

/* container */
.container {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

/* card glass */
.card {
    width:350px;
    padding:25px;
    border-radius:20px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);

    box-shadow: 0 0 30px rgba(0,255,200,0.3);
    transition:0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 50px #00ffe0;
}

/* IP */
.ip {
    font-size:18px;
    color:#00ffe0;
}

/* زر join */
.join {
    margin-top:15px;
    padding:12px;
    border-radius:50px;
    display:block;
    text-decoration:none;
    color:white;
    font-weight:bold;

    background: linear-gradient(45deg, #ff0000, #ff5e5e);
    box-shadow:0 0 20px red;
    transition:0.3s;
}

.join:hover {
    transform: scale(1.1);
    box-shadow:0 0 40px red;
}

/* social */
.socials {
    display:flex;
    gap:10px;
    justify-content:center;
}

.social {
    flex:1;
    padding:10px;
    border-radius:30px;
    text-decoration:none;
    color:white;
    font-weight:bold;

    background:#00ffe0;
    color:black;
    transition:0.3s;
}

.social:hover {
    transform: scale(1.1);
    background:#00c9a7;
}

/* مميزات */
.features p {
    margin:6px;
}

/* animation دخول */
.fade {
    animation:fadeUp 1s ease;
}

@keyframes fadeUp {
    from {
        opacity:0;
        transform: translateY(40px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<div class="logo fade">🔥 CS 1.6 DZ 🔥</div>

<div class="card fade">
    <h2>🎮 مرحبا بك</h2>
    <p>أفضل سيرفر في الجزائر</p>
</div>

<div class="card fade">
    <h2>💻 Server</h2>
    <div class="ip">94.23.78.29:27020</div>

    <a class="join" href="steam://connect/94.23.78.29:27020">
        🔥 Join Now
    </a>
</div>

<div class="card features fade">
    <h2>🔥 Features</h2>
    <p>✔ Headshot Only</p>
    <p>✔ Anti-Cheat قوي</p>
    <p>✔ Ping منخفض</p>
    <p>✔ Admin Active</p>
</div>

<div class="card fade">
    <h2>📱 تواصل</h2>

    <div class="socials">
        <a class="social" href="https://instagram.com/ya9inx" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>

        <a class="social" href="https://discord.gg/ya9inx" target="_blank">
            <i class="fab fa-discord"></i>
        </a>
    </div>

</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CS 1.6 DZ</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("https://images.unsplash.com/photo-1542751371-adc38448a05e") no-repeat center/cover;
    color: white;
    text-align: center;
}

/* overlay */
.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
    padding: 40px 0;
}

/* title animation */
h1 {
    color: #00ffd5;
    font-size: 45px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ffd5; }
    to { text-shadow: 0 0 30px #00ffd5; }
}

/* cards */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    width: 320px;
    margin: 25px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ffd5;
    animation: fadeUp 1s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* buttons */
.btn {
    display: block;
    margin: 12px auto;
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

/* join button */
.join {
    background: red;
    color: white;
}

.join:hover {
    transform: scale(1.1);
}

/* social buttons */
.insta {
    background: linear-gradient(45deg,#ff00cc,#ff6600);
    color: white;
}

.discord {
    background: #5865F2;
    color: white;
}

.btn:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="overlay">

<h1>🔥 CS 1.6 DZ 🔥</h1>

<div class="card">
<h2>🎮 مرحبا بيكم</h2>
<p>أفضل سيرفر Counter Strike 1.6</p>
</div>

<div class="card">
<h2><i class="fa-solid fa-desktop"></i> IP Server</h2>
<p>connect 94.23.78.29:27020</p>

<a class="btn join" href="steam://connect/94.23.78.29:27020">
🔥 Join Server
</a>
</div>

<div class="card">
<h2><i class="fa-solid fa-mobile"></i> تواصل معنا</h2>

<a class="btn insta" href="https://instagram.com/ya9inx" target="_blank">
<i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="btn discord" href="https://discord.gg/xxxxx" target="_blank">
<i class="fa-brands fa-discord"></i> Discord
</a>

</div>

</div>

</body>
</html>
